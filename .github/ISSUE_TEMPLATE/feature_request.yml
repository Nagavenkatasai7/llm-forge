name: Feature Request
description: Suggest a new feature for llm-forge
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like.
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear description of the feature you'd like.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why would this feature be useful?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions you've considered.
  - type: dropdown
    id: area
    attributes:
      label: Component
      options:
        - Configuration
        - Data Pipeline
        - Training
        - Evaluation
        - RAG
        - Serving
        - CLI
        - Documentation
        - Other
