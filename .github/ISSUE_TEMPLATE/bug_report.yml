name: Bug Report
description: Report a bug in llm-forge
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Create config with...
        2. Run `llm-forge train --config ...`
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Configuration (YAML)
      description: Your YAML config file (remove any sensitive info).
      render: yaml
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Output of `llm-forge info`
      render: text
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Relevant error messages or stack traces.
      render: text
