# =============================================================================
# llm-forge preset: qlora_default
# =============================================================================
# QLoRA fine-tuning of Llama-3.2-1B with 4-bit NF4 quantization.
# Designed for memory-constrained GPUs (>= 8 GB VRAM, e.g. RTX 3060/4060).
#
# Key differences from lora_default:
#   - 4-bit NF4 quantization with double quantization
#   - Gradient checkpointing enabled to save VRAM
#   - Smaller micro-batch size (2 instead of 4)
#   - Paged AdamW 8-bit optimiser for lower optimizer memory
#   - Higher gradient accumulation to maintain effective batch size
#
# Effective batch size = 2 * 8 = 16
# =============================================================================

model:
  name: "meta-llama/Llama-3.2-1B"
  torch_dtype: "bf16"
  max_seq_length: 2048
  attn_implementation: "flash_attention_2"
  trust_remote_code: false

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"
  use_rslora: false
  use_dora: false

quantization:
  load_in_4bit: true            # 4-bit quantization enabled
  load_in_8bit: false
  bnb_4bit_compute_dtype: "bf16"
  bnb_4bit_quant_type: "nf4"    # NormalFloat4 -- best for QLoRA
  bnb_4bit_use_double_quant: true  # Nested quantization saves ~0.4 bits/param

data:
  train_path: "tatsu-lab/alpaca"
  format: "alpaca"
  input_field: "instruction"
  output_field: "output"
  context_field: "input"
  test_size: 0.05
  seed: 42
  streaming: false
  num_workers: 4
  cleaning:
    enabled: true
    quality_preset: "balanced"
    unicode_fix: true
    heuristic_filter: true
    min_word_count: 5
    max_word_count: 100000
    alpha_ratio_threshold: 0.6
    symbol_to_word_ratio: 0.1
    dedup_enabled: true
    dedup_tiers:
      - "exact"
      - "fuzzy"
    dedup_jaccard_threshold: 0.85
    dedup_num_perm: 128
    dedup_shingle_size: 5
    toxicity_filter: false
    pii_redaction: false

training:
  mode: "qlora"                             # QLoRA mode auto-enables quantization
  output_dir: "outputs/qlora-llama3.2-1b"
  num_epochs: 3
  per_device_train_batch_size: 2            # Smaller batch for low VRAM
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8            # Keep effective batch = 16
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  logging_steps: 10
  eval_strategy: "epoch"
  save_steps: 500
  save_total_limit: 3
  bf16: true
  fp16: false
  gradient_checkpointing: true              # Essential for QLoRA to fit in VRAM
  optim: "paged_adamw_8bit"                 # 8-bit paged optimizer for memory savings
  group_by_length: true
  report_to:
    - "wandb"

evaluation:
  enabled: true
  benchmarks:
    - "hellaswag"
    - "arc_easy"
  num_fewshot: 0
  batch_size: 4
  generate_report: true

serving:
  backend: "gradio"
  port: 7860
  merge_adapter: true
