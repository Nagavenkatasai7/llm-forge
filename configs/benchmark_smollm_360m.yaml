# Benchmark: SmolLM2-360M LoRA — Small model, robust test (~10 min on A100)
# Tests: slightly larger model, more target modules, data cleaning
# Run: llm-forge train --config configs/benchmark_smollm_360m.yaml --verbose

model:
  name: "HuggingFaceTB/SmolLM2-360M"
  max_seq_length: 1024
  attn_implementation: "sdpa"
  torch_dtype: "bf16"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

data:
  train_path: "tatsu-lab/alpaca"
  format: "alpaca"
  max_samples: 2000
  test_size: 0.1
  cleaning:
    enabled: true
    quality_preset: "balanced"
    unicode_fix: true
    dedup_enabled: true

training:
  mode: "lora"
  output_dir: "./outputs/benchmark-smollm-360m/"
  num_epochs: 2
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  bf16: true
  save_steps: 500
  logging_steps: 10
  report_to:
    - "none"

evaluation:
  enabled: true
  benchmarks:
    - hellaswag
    - arc_easy
  num_fewshot: 0
  generate_report: true

serving:
  export_format: "safetensors"
  merge_adapter: true
