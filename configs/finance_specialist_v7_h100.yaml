# ============================================================================
# Finance Specialist v7 — Hopper HPC (A100 80GB)
# ============================================================================
# Knowledge-preserving fine-tuning with all v6 benchmark failures fixed.
# See configs/finance_specialist_v7.yaml header for detailed change log.
#
# Key differences from local config:
#   - bf16: true (A100 supports bfloat16 natively)
#   - attn_implementation: "sdpa" (flash_attention_2 not installed on Hopper)
#   - per_device_train_batch_size: 4 (more VRAM available)
#   - gradient_accumulation_steps: 4 (effective batch = 16)
# ============================================================================

model:
  name: "unsloth/Llama-3.2-1B-Instruct"
  max_seq_length: 2048
  attn_implementation: "sdpa"
  torch_dtype: "bf16"

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
  bias: "none"
  task_type: "CAUSAL_LM"
  use_rslora: false
  use_dora: false

data:
  train_path: "Josephgflowers/Finance-Instruct-500k"
  format: "sharegpt"
  system_prompt: "You are a finance specialist AI assistant. You provide accurate, well-reasoned financial analysis and advice based on established financial principles, regulations, and market practices. You can also discuss other topics when asked."
  test_size: 0.05
  max_samples: 20000
  seed: 42
  num_workers: 8
  cleaning:
    enabled: true
    quality_preset: "permissive"
    heuristic_filter: true
    min_word_count: 10
    dedup_enabled: true

training:
  mode: "lora"
  output_dir: "/scratch/nchennu/models/finance-specialist-v7"
  num_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 50
  save_steps: 50
  save_total_limit: 2
  bf16: true
  fp16: false
  gradient_checkpointing: true
  optim: "adamw_torch"
  group_by_length: true
  report_to:
    - "none"
  neftune_noise_alpha: null
  label_smoothing_factor: 0.0
  completion_only_loss: true
  assistant_only_loss: true
  average_tokens_across_devices: false
  pack_sequences: false

evaluation:
  enabled: false

iti:
  enabled: false

refusal:
  enabled: false

ifd:
  enabled: false

serving:
  export_format: "safetensors"
  gguf_quantization: "Q4_K_M"
  merge_adapter: true
  generate_modelfile: true
  inference_temperature: 0.1
  inference_top_k: 40
  inference_repeat_penalty: 1.1
  inference_num_predict: 256
  inference_num_ctx: 2048

# ============================================================================
# Compute Backend — Hopper HPC via SLURM
# ============================================================================
# Run from local: python -m llm_forge.launch --config configs/finance_specialist_v7_h100.yaml
# This will rsync code → submit SLURM job → stream logs → pull outputs.
# ============================================================================
compute:
  backend: "slurm"
  sync_code: true
  stream_logs: true
  pull_outputs: true
  ssh:
    host: "hopper"
    remote_dir: "~/llm-forge"
    sync_exclude:
      - ".venv"
      - "__pycache__"
      - "*.pyc"
      - "outputs/"
      - "eval_results/"
      - ".git"
      - "*.egg-info"
  slurm:
    partition: "gpuq"
    qos: "gpu"
    gres: "gpu:A100.80gb:1"
    cpus_per_task: 8
    mem_gb: 64
    time_limit: "2:00:00"
    exclude_nodes: "gpu032,dgx003"
    conda_env: "llm-forge"
    conda_prefix: "~/miniforge"
    extra_env:
      HF_HOME: "/scratch/nchennu/hf_cache"
