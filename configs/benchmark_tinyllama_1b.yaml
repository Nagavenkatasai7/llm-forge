# Benchmark: TinyLlama-1.1B LoRA — Medium test (~15 min on A100)
# Tests: 1B parameter model, full LoRA target modules, gradient checkpointing
# Run: llm-forge train --config configs/benchmark_tinyllama_1b.yaml --verbose

model:
  name: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
  max_seq_length: 2048
  attn_implementation: "flash_attention_2"
  torch_dtype: "bf16"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_path: "tatsu-lab/alpaca"
  format: "alpaca"
  max_samples: 3000
  test_size: 0.05
  cleaning:
    enabled: true
    quality_preset: "balanced"
    unicode_fix: true
    dedup_enabled: true

training:
  mode: "lora"
  output_dir: "./outputs/benchmark-tinyllama-1b/"
  num_epochs: 1
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  gradient_checkpointing: true
  bf16: true
  neftune_noise_alpha: 5.0
  save_steps: 500
  logging_steps: 10
  report_to:
    - "none"

evaluation:
  enabled: true
  benchmarks:
    - hellaswag
    - arc_easy
  num_fewshot: 0
  generate_report: true

serving:
  export_format: "safetensors"
  merge_adapter: true
