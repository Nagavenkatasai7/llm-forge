# Benchmark: SmolLM2-135M LoRA — Fastest test (< 5 min on A100)
# Tests: basic LoRA pipeline, data loading, training loop, evaluation
# Run: llm-forge train --config configs/benchmark_smollm_135m.yaml --verbose

model:
  name: "HuggingFaceTB/SmolLM2-135M"
  max_seq_length: 512
  attn_implementation: "sdpa"
  torch_dtype: "bf16"

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj

data:
  train_path: "tatsu-lab/alpaca"
  format: "alpaca"
  max_samples: 1000
  test_size: 0.1

training:
  mode: "lora"
  output_dir: "./outputs/benchmark-smollm-135m/"
  num_epochs: 1
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 3.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  bf16: true
  save_steps: 500
  logging_steps: 5
  report_to:
    - "none"

evaluation:
  enabled: true
  benchmarks:
    - hellaswag
  num_fewshot: 0
  generate_report: true

serving:
  export_format: "safetensors"
  merge_adapter: true
