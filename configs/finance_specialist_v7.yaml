# ============================================================================
# Finance Specialist v7 — Knowledge-Preserving Fine-Tuning
# ============================================================================
# Key changes from v6 (which failed benchmarks catastrophically):
#
# 1. target_modules: attention-only (was all-linear)
#    → Preserves MLP reasoning layers (GSM8K dropped 27% with all-linear)
#
# 2. use_rslora: false (was true)
#    → RSLoRA with alpha=32, r=16 gave 4x higher effective LR than intended
#
# 3. learning_rate: 1e-5 (was 5e-5)
#    → Lower LR reduces weight perturbation, preserves base knowledge
#
# 4. neftune_noise_alpha: null (was 5.0)
#    → NEFTune noise on 5K samples amplified forgetting
#
# 5. label_smoothing_factor: 0.0 (was 0.0, but schema default was 0.1)
#    → Label smoothing hurts MC benchmark accuracy on small datasets
#
# 6. max_samples: 5000 (same) but with data cleaning enabled
#    → Clean the Finance-Instruct-500k data to remove noise
#
# 7. r: 8, alpha: 16 (was r=16, alpha=32)
#    → Smaller rank = less perturbation = less forgetting
# ============================================================================

model:
  name: "unsloth/Llama-3.2-1B-Instruct"
  max_seq_length: 2048
  attn_implementation: "sdpa"
  torch_dtype: "bf16"

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
  bias: "none"
  task_type: "CAUSAL_LM"
  use_rslora: false
  use_dora: false

data:
  train_path: "Josephgflowers/Finance-Instruct-500k"
  format: "sharegpt"
  system_prompt: "You are a finance specialist AI assistant. You provide accurate, well-reasoned financial analysis and advice based on established financial principles, regulations, and market practices. You can also discuss other topics when asked."
  test_size: 0.05
  max_samples: 5000
  seed: 42
  num_workers: 4
  cleaning:
    enabled: true
    quality_preset: "balanced"
    heuristic_filter: true
    min_word_count: 10
    dedup_enabled: true

training:
  mode: "lora"
  output_dir: "outputs/finance-specialist-v7"
  num_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 100
  save_steps: 100
  save_total_limit: 2
  bf16: false
  fp16: false
  gradient_checkpointing: true
  optim: "adamw_torch"
  group_by_length: true
  report_to:
    - "none"
  neftune_noise_alpha: null
  label_smoothing_factor: 0.0
  completion_only_loss: true
  assistant_only_loss: true
  average_tokens_across_devices: false
  pack_sequences: false

evaluation:
  enabled: false

iti:
  enabled: false

refusal:
  enabled: false

ifd:
  enabled: false

serving:
  export_format: "gguf"
  gguf_quantization: "Q4_K_M"
  merge_adapter: true
  generate_modelfile: true
  inference_temperature: 0.1
  inference_top_k: 40
  inference_repeat_penalty: 1.1
  inference_num_predict: 256
  inference_num_ctx: 2048

# ============================================================================
# Compute Backend — Local (Mac / Linux)
# ============================================================================
compute:
  backend: "local"
