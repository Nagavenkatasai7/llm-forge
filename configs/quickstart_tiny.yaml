# llm-forge: Quick-Start Config (Tiny Model)
# Tests the full pipeline in ~5 minutes, even on CPU.
# Uses a 135M parameter model and sample data included in the repo.
#
# Run: llm-forge train --config configs/quickstart_tiny.yaml --verbose

model:
  name: "HuggingFaceTB/SmolLM2-135M"    # Tiny model, downloads in seconds
  max_seq_length: 512
  attn_implementation: "sdpa"             # Works everywhere, no flash-attn needed
  torch_dtype: "bf16"

lora:
  r: 8                                    # Small rank for fast training
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj

data:
  train_path: "./examples/data/sample_train.jsonl"   # 10 samples included
  format: "alpaca"
  test_size: 0.2

training:
  mode: "lora"
  output_dir: "./outputs/quickstart-tiny/"
  num_epochs: 2
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  bf16: true
  save_steps: 100
  logging_steps: 1
  report_to:
    - "none"                              # No wandb needed for testing

evaluation:
  enabled: false                          # Skip benchmarks for quick test

serving:
  export_format: "safetensors"
  merge_adapter: true
