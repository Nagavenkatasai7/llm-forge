# llm-forge: Legal Domain Fine-Tuning Configuration
# Fine-tune a model on legal texts and documents.
# Run: llm-forge train --config configs/example_legal_domain.yaml

model:
  name: "meta-llama/Llama-3.2-1B"
  max_seq_length: 4096
  attn_implementation: "flash_attention_2"
  torch_dtype: "bf16"

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_path: "./data/legal_train.jsonl"
  format: "alpaca"
  system_prompt: "You are a legal knowledge assistant. Provide information based on legal documents and precedents. This is for educational purposes only and not legal advice."
  test_size: 0.1
  cleaning:
    enabled: true
    quality_preset: "strict"
    unicode_fix: true
    language_filter: ["en"]
    pii_redaction: true
    dedup_enabled: true

training:
  mode: "lora"
  output_dir: "./output/legal-llm"
  num_epochs: 5
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  gradient_checkpointing: true
  bf16: true

evaluation:
  enabled: true
  custom_eval_path: "./data/legal_eval.jsonl"
  benchmarks:
    - mmlu

serving:
  backend: "gradio"
  export_format: "safetensors"
  merge_adapter: true
