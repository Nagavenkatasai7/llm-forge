# llm-forge: QLoRA Fine-Tuning Configuration
# 4-bit quantized LoRA for memory-efficient fine-tuning.
# Enables 7B model training on 24GB VRAM GPUs.
# Run: llm-forge train --config configs/example_qlora.yaml

model:
  name: "meta-llama/Llama-3.2-1B"
  max_seq_length: 2048
  attn_implementation: "flash_attention_2"
  torch_dtype: "bf16"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bf16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

data:
  train_path: "./data/train.jsonl"
  format: "alpaca"
  test_size: 0.1
  cleaning:
    enabled: true
    quality_preset: "balanced"

training:
  mode: "qlora"
  output_dir: "./output/my-qlora"
  num_epochs: 3
  per_device_train_batch_size: 2          # Smaller batch for 4-bit
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  gradient_checkpointing: true
  bf16: true
  neftune_noise_alpha: 5.0

evaluation:
  enabled: true
  benchmarks:
    - hellaswag
    - arc_easy

serving:
  backend: "gradio"
  export_format: "safetensors"
  merge_adapter: true
