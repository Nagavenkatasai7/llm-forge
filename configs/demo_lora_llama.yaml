# llm-forge: Demo LoRA Fine-Tuning — Llama-3.2-1B on Alpaca
# Showcases end-to-end training on GMU Hopper A100 GPU.
# Run: llm-forge train --config configs/demo_lora_llama.yaml --verbose
# Expected: ~30 min on 1x A100 80GB, ~52K samples, 3 epochs

model:
  name: "meta-llama/Llama-3.2-1B"
  max_seq_length: 2048
  attn_implementation: "flash_attention_2"
  torch_dtype: "bf16"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_path: "tatsu-lab/alpaca"           # Auto-downloaded from HuggingFace Hub
  format: "alpaca"
  test_size: 0.05                           # 5% holdout for validation
  cleaning:
    enabled: true
    quality_preset: "balanced"
    unicode_fix: true
    dedup_enabled: true

training:
  mode: "lora"
  output_dir: "./outputs/demo-lora-llama3.2-1b/"
  num_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4            # Effective batch size = 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  gradient_checkpointing: true
  bf16: true
  neftune_noise_alpha: 5.0
  save_steps: 500
  logging_steps: 10
  report_to:
    - "none"

evaluation:
  enabled: true
  benchmarks:
    - hellaswag
    - arc_easy
  generate_report: true                     # HTML evaluation report

serving:
  export_format: "safetensors"
  merge_adapter: true
