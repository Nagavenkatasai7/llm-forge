# llm-forge: RAG Pipeline Configuration
# Build a Retrieval-Augmented Generation system.
# Run: llm-forge rag build --config configs/example_rag.yaml

model:
  name: "meta-llama/Llama-3.2-1B"
  max_seq_length: 2048
  torch_dtype: "bf16"

data:
  train_path: "./data/documents/"           # Directory of documents to index
  format: "completion"

rag:
  enabled: true
  knowledge_base_path: "./data/documents/"
  chunk_strategy: "semantic"                 # fixed | semantic | hierarchical | adaptive
  chunk_size: 512
  chunk_overlap: 64
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  vectorstore: "chromadb"                    # chromadb | faiss
  top_k: 5
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  hybrid_search: true                        # Combine dense + BM25
  similarity_threshold: 0.7

serving:
  backend: "gradio"
  port: 7860
